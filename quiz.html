<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Làm bài</title>
</head>
<body style="font-family:Arial; max-width:700px; margin:auto; padding:20px">

<h2 id="welcome"></h2>

<div id="quiz"></div>

<button onclick="submitTest()">Nộp bài</button>

<h2 id="result"></h2>

<script>
const questions = [
  {
    question: "Thủ đô Việt Nam là gì?",
    options: ["HCM", "Hà Nội", "Đà Nẵng"],
    answer: 1
  },
  {
    question: "2 + 2 = ?",
    options: ["3", "4", "5"],
    answer: 1
  },
  {
    question: "Màu trời là gì?",
    options: ["Xanh", "Đỏ", "Vàng"],
    answer: 0
  }
];

// hiển thị tên
const name = localStorage.getItem("studentName") || "Học sinh";
document.getElementById("welcome").innerText = "Xin chào " + name;

// load câu hỏi
const quizDiv = document.getElementById("quiz");

questions.forEach((q, index) => {
  const div = document.createElement("div");

  div.innerHTML = `
    <p><b>Câu ${index + 1}:</b> ${q.question}</p>
    ${q.options.map((opt, i) => `
      <label>
        <input type="radio" name="q${index}" value="${i}">
        ${opt}
      </label><br>
    `).join("")}
    <br>
  `;

  quizDiv.appendChild(div);
});

function submitTest() {
  let score = 0;

  questions.forEach((q, index) => {
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    if (selected && parseInt(selected.value) === q.answer) {
      score++;
    }
  });

  document.getElementById("result").innerText =
    "Bạn đúng " + score + "/" + questions.length + " câu";
}
</script>

</body>
</html>
