<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Làm bài</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* KHUNG BÀI LÀM */
    .container {
      position: relative;
      z-index: 1;
      width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      background: white;
      color: black;
      padding: 30px;
      border-radius: 20px;
      border: 3px solid #3b82f6;
      box-shadow: 0 0 25px rgba(59,130,246,0.4);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .question {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 5px 0;
      cursor: pointer;
    }

    input[type="radio"] {
      margin-right: 8px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #1e3a8a);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #1e3a8a;
    }
    #timer {
  position: fixed; /* luôn đứng yên */
  top: 20px;
  right: 20px;
  background: white;
  color: #1e3a8a;
  padding: 12px 18px;
  border-radius: 12px;
  border: 2px solid #3b82f6;
  font-weight: bold;
  font-size: 18px;
  box-shadow: 0 0 15px rgba(59,130,246,0.4);
  z-index: 999;
  transition: 0.3s;
}

/* khi sắp hết giờ */
.timer-danger {
  color: red !important;
  border-color: red !important;
  box-shadow: 0 0 15px red !important;
}
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div id="particles"></div>
<div id="timer">90:00</div>
<div class="container">

  <h2 id="welcome"></h2>

  <div id="quiz"></div>

  <button onclick="submitTest()">Nộp bài</button>

  <div id="result"></div>

</div>

<script>
const originalQuestions = [
  {
    passage: `Cho đoạn tư liệu sau:
Một nhóm học sinh nghiên cứu ảnh hưởng của pH dung dịch đến sức điện động của pin Galvani Zn - Cu. Giả thuyết được đưa ra là: "Khi thay đổi pH của dung dịch muối sẽ thay đổi sức điện động của pin điện". Nhóm học sinh đó tiến hành thí nghiệm như sau ở 25<sup>o</sup>C: <br>

<b><i>Thí nghiệm 1:</i></b> Lấy thanh Zn nhúng vào cốc 1 đựng 400 mL dung dịch ZnSO<sub>4</sub> 1,25M và thanh Cu nhúng vào cốc 2 chứa 400 mL dung dịch CuSO<sub>4</sub> 1,25M, thêm nước cất vào cả hai cốc để thành 500 mL dung dịch. Nối hai dung dịch với nhau bằng cầu muối KCl nhão và hai thanh kim loại với một vôn kế như hình vẽ sau: <br>

<img src='images/pin zn-cu.png' style="width: 100%; max-width: 500px;"> <br>
Để hệ thống ổn định khoảng 2 phút và ghi lại số chỉ vôn kế và được giá trị là 1,10 V. Lặp lại các bước như thí nghiệm 1 nhưng thay nước cất ở một trong hai cốc bằng dung dịch H<sub>2</sub>SO<sub>4</sub> 2M. Cụ thể: <br>
<b><i>Thí nghiệm 2:</i></b> thay nước cất ở cốc 1 bằng 100 mL dung dịch H<sub>2</sub>SO<sub>4</sub> 2M, thì số chỉ vôn kế là 1,07 V. <br>
<b><i>Thí nghiệm 3:</i></b> thay nước cất ở cốc 2 bằng 100 mL dung dịch H<sub>2</sub>SO<sub>4</sub> 2M, thì số chỉ vôn kế là 1,12 V.`,

    questions: [
      {
        question: "Trong Thí nghiệm 1, nồng độ mol của dung dịch ZnSO<sub>4</sub> và CuSO<sub>4</sub> sau khi pha loãng bằng nước cất là bao nhiêu?",
        options: ["A. 1,56M.", "B. 1,25M.", "C. 0,8M.", "D. 1,00M."],
        answer: 3
      },
      {
        question: `Cho các phát biểu sau: <br>
(1) Dựa trên hình vẽ và nguyên lý hoạt động của pin Galvani Zn−Cu, thanh Zn đóng vai trò là anode và xảy ra quá trình oxi hóa. <br>
(2) Việc thêm dung dịch H<sub>2</sub>SO<sub>4</sub> vào cốc 2 (Thí nghiệm 3) làm giảm sức điện động của pin so với Thí nghiệm 1. <br>
(3) Trong các thí nghiệm trên, cầu muối KCl có vai trò chính là duy trì sự trung hòa điện tích giữa hai dung dịch. <br>
(4) Sự thay đổi sức điện động giữa Thí nghiệm 2 và Thí nghiệm 3 chứng minh giả thuyết ban đầu là đúng vì pH ảnh hưởng đến pin. <br>
(5) Trong Thí nghiệm 1, dòng electron sẽ di chuyển từ thanh Cu sang thanh Zn thông qua dây dẫn. <br>
Số phát biểu SAI là:`,
options: ["A. 3.", "B. 5.", "C. 2.", "D. 1."],
answer: 2
      },
      {
        question: "Nồng độ mol của H<sub>2</sub>SO<sub>4</sub> trong dung dịch tại cốc 1 của Thí nghiệm 2 là bao nhiêu?",
        options: ["A. 2,00M.", "B. 0,40M.", "C. 0,50M.", "D. 0,20M."],
        answer: 1
      },
    ]
  },

];
const studentID = localStorage.getItem("studentID");

if (!studentID) {
  alert("Chưa đăng nhập!");
  window.location.href = "login.html";
}

function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function getSeedFromString(str) {
  return str.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
}

function shuffleWithSeed(array, seed) {
  let arr = [...array];
  let currentIndex = arr.length;

  while (currentIndex !== 0) {
    let randomIndex = Math.floor(seededRandom(seed++) * currentIndex);
    currentIndex--;

    [arr[currentIndex], arr[randomIndex]] = [
      arr[randomIndex], arr[currentIndex]
    ];
  }

  return arr;
}

const seed = getSeedFromString(studentID);
const questions = shuffleWithSeed(originalQuestions, seed);

document.getElementById("welcome").innerText = "Mã học sinh: " + studentID;

const quizDiv = document.getElementById("quiz");

questions.forEach((group, groupIndex) => {

  if (group.passage) {
    const passageDiv = document.createElement("div");
    passageDiv.innerHTML = `<p><b>📄 Tư liệu:</b> ${group.passage}</p><hr>`;
    quizDiv.appendChild(passageDiv);
  }

  // 🔥 XÁO TRỘN CÂU TRONG GROUP
  const shuffledQuestions = shuffleWithSeed(group.questions, seed + groupIndex);

  shuffledQuestions.forEach((q, index) => {

  group.questions.forEach((q, index) => {
    const qIndex = groupIndex + "_" + index;
    const saved = localStorage.getItem("q" + qIndex);

    const div = document.createElement("div");
    div.classList.add("question");

    div.innerHTML = `
      <p><b>Câu hỏi:</b> ${q.question}</p>
      ${q.options.map((opt, i) => `
        <label>
          <input type="radio" name="q${qIndex}" value="${i}"
            ${saved == i ? "checked" : ""}
            onchange="saveAnswer('${qIndex}', ${i})">
          ${opt}
        </label>
      `).join("")}
    `;

    quizDiv.appendChild(div);
  });

});
function saveAnswer(qIndex, value) {
  localStorage.setItem("q" + qIndex, value);
}
function submitTest() {
  clearInterval(countdown);

localStorage.removeItem("startTime_" + studentID);

  let score = 0;
  let answers = [];

originalQuestions.forEach((group, groupIndex) => {
  group.questions.forEach((q, index) => {
    const qIndex = groupIndex + "_" + index;
    const selected = localStorage.getItem("q" + qIndex);

    answers.push(selected ?? "");

    if (selected !== null && parseInt(selected) === q.answer) {
      score++;
    }

    localStorage.removeItem("q" + qIndex);
  });
});

  localStorage.setItem("done_" + studentID, "true");

  // 🔥 GỬI LÊN GOOGLE FORM
  fetch("https://docs.google.com/forms/d/e/1FAIpQLSd_YK4a8Av99jA8Am5yOBx1kw2Xuw2nRlMz-Mfx08GqnO_T5Q/formResponse", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:
      "entry.891986647=" + studentID +
      "&entry.156437038=" + score +
      "&entry.1381726656=" + answers.join(",")
  });

  alert("🎉 Chúc mừng bạn đã hoàn thành bài thi!");
  window.location.href = "index.html";
}

// particles nhẹ
tsParticles.load("particles", {
  particles: {
    number: { value: 40 },
    color: { value: "#3b82f6" },
    size: { value: 2 },
    move: { enable: true, speed: 0.5 },
    links: {
      enable: true,
      color: "#3b82f6",
      opacity: 0.1
    }
  }
});
  // tổng thời gian (5 phút)
const TOTAL_TIME = 5400;

// lấy thời điểm bắt đầu (lưu lại)
const key = "startTime_" + studentID;

let startTime = localStorage.getItem(key);

if (!startTime) {
  startTime = Date.now();
  localStorage.setItem(key, startTime);
}
const timerEl = document.getElementById("timer");

const countdown = setInterval(() => {
  const now = Date.now();
  const elapsed = Math.floor((now - startTime) / 1000);
  let timeLeft = TOTAL_TIME - elapsed;

  if (timeLeft < 0) timeLeft = 0;

  let minutes = Math.floor(timeLeft / 60);
  let seconds = timeLeft % 60;

  minutes = minutes < 10 ? "0" + minutes : minutes;
  seconds = seconds < 10 ? "0" + seconds : seconds;

  timerEl.innerText = minutes + ":" + seconds;

  // 🔴 đổi màu khi còn < 60s
  if (timeLeft <= 60) {
    timerEl.classList.add("timer-danger");
  }

  // hết giờ
  if (timeLeft === 0) {
    clearInterval(countdown);
    alert("Hết giờ!");
    localStorage.removeItem("startTime"); // reset cho lần sau
    submitTest();
  }

}, 1000);
  // chặn copy
document.addEventListener("copy", e => {
  e.preventDefault();
});

// chặn paste
document.addEventListener("paste", e => {
  e.preventDefault();
});

// chặn cut
document.addEventListener("cut", e => {
  e.preventDefault();
});

// chặn chuột phải
document.addEventListener("contextmenu", e => {
  e.preventDefault();
});

// chặn phím
document.addEventListener("keydown", e => {
  if (
    (e.ctrlKey && ["c","v","u","s"].includes(e.key.toLowerCase())) ||
    e.key === "F12"
  ) {
    e.preventDefault();
  }
});
</script>

</body>
</html>
