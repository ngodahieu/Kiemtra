<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Làm bài</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* KHUNG BÀI LÀM */
    .container {
      position: relative;
      z-index: 1;
      width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      background: white;
      color: black;
      padding: 30px;
      border-radius: 20px;
      border: 3px solid #3b82f6;
      box-shadow: 0 0 25px rgba(59,130,246,0.4);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .question {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 5px 0;
      cursor: pointer;
    }

    input[type="radio"] {
      margin-right: 8px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #1e3a8a);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #1e3a8a;
    }
    #timer {
  position: fixed; /* luôn đứng yên */
  top: 20px;
  right: 20px;
  background: white;
  color: #1e3a8a;
  padding: 12px 18px;
  border-radius: 12px;
  border: 2px solid #3b82f6;
  font-weight: bold;
  font-size: 18px;
  box-shadow: 0 0 15px rgba(59,130,246,0.4);
  z-index: 999;
  transition: 0.3s;
}

/* khi sắp hết giờ */
.timer-danger {
  color: red !important;
  border-color: red !important;
  box-shadow: 0 0 15px red !important;
}
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div id="particles"></div>
<div id="timer">02:00</div>
<div class="container">

  <h2 id="welcome"></h2>

  <div id="quiz"></div>

  <button onclick="submitTest()">Nộp bài</button>

  <div id="result"></div>

</div>

<script>
const originalQuestions = [
  {
    passage: "Nước (H2O) gồm 2 nguyên tử H và 1 nguyên tử O.",
    questions: [
      {
        question: "H2O có bao nhiêu nguyên tử?",
        options: ["2", "3", "4"],
        answer: 1
      },
      {
        question: "Trong nước có nguyên tố nào?",
        options: ["Na", "O", "Cl"],
        answer: 1
      }
    ]
  },
  {
    passage: "", // câu thường
    questions: [
      {
        question: "Na là nguyên tố gì?",
        options: ["Natri", "Nitơ", "Neon"],
        answer: 0
      }
    ]
  }
];
const studentID = localStorage.getItem("studentID");

if (!studentID) {
  alert("Chưa đăng nhập!");
  window.location.href = "login.html";
}

function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function getSeedFromString(str) {
  return str.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
}

function shuffleWithSeed(array, seed) {
  let arr = [...array];
  let currentIndex = arr.length;

  while (currentIndex !== 0) {
    let randomIndex = Math.floor(seededRandom(seed++) * currentIndex);
    currentIndex--;

    [arr[currentIndex], arr[randomIndex]] = [
      arr[randomIndex], arr[currentIndex]
    ];
  }

  return arr;
}

const seed = getSeedFromString(studentID);
const questions = shuffleWithSeed(originalQuestions, seed);

document.getElementById("welcome").innerText = "Mã học sinh: " + studentID;

const quizDiv = document.getElementById("quiz");

originalQuestions.forEach((group, groupIndex) => {

  // hiện tư liệu nếu có
  if (group.passage) {
    const passageDiv = document.createElement("div");
    passageDiv.innerHTML = `<p><b>📄 Tư liệu:</b> ${group.passage}</p><hr>`;
    quizDiv.appendChild(passageDiv);
  }

  group.questions.forEach((q, index) => {
    const qIndex = groupIndex + "_" + index;
    const saved = localStorage.getItem("q" + qIndex);

    const div = document.createElement("div");
    div.classList.add("question");

    div.innerHTML = `
      <p><b>Câu hỏi:</b> ${q.question}</p>
      ${q.options.map((opt, i) => `
        <label>
          <input type="radio" name="q${qIndex}" value="${i}"
            ${saved == i ? "checked" : ""}
            onchange="saveAnswer('${qIndex}', ${i})">
          ${opt}
        </label>
      `).join("")}
    `;

    quizDiv.appendChild(div);
  });

});
function saveAnswer(qIndex, value) {
  localStorage.setItem("q" + qIndex, value);
}
function submitTest() {
  clearInterval(countdown);

localStorage.removeItem("startTime_" + studentID);

  let score = 0;
  let answers = [];

originalQuestions.forEach((group, groupIndex) => {
  group.questions.forEach((q, index) => {
    const qIndex = groupIndex + "_" + index;
    const selected = localStorage.getItem("q" + qIndex);

    answers.push(selected ?? "");

    if (selected !== null && parseInt(selected) === q.answer) {
      score++;
    }

    localStorage.removeItem("q" + qIndex);
  });
});

  localStorage.setItem("done_" + studentID, "true");

  // 🔥 GỬI LÊN GOOGLE FORM
  fetch("https://docs.google.com/forms/d/e/1FAIpQLSd_YK4a8Av99jA8Am5yOBx1kw2Xuw2nRlMz-Mfx08GqnO_T5Q/formResponse", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:
      "entry.891986647=" + studentID +
      "&entry.156437038=" + score +
      "&entry.1381726656=" + answers.join(",")
  });

  alert("🎉 Chúc mừng bạn đã hoàn thành bài thi!");
  window.location.href = "index.html";
}

// particles nhẹ
tsParticles.load("particles", {
  particles: {
    number: { value: 40 },
    color: { value: "#3b82f6" },
    size: { value: 2 },
    move: { enable: true, speed: 0.5 },
    links: {
      enable: true,
      color: "#3b82f6",
      opacity: 0.1
    }
  }
});
  // tổng thời gian (5 phút)
const TOTAL_TIME = 120;

// lấy thời điểm bắt đầu (lưu lại)
const key = "startTime_" + studentID;

let startTime = localStorage.getItem(key);

if (!startTime) {
  startTime = Date.now();
  localStorage.setItem(key, startTime);
}
const timerEl = document.getElementById("timer");

const countdown = setInterval(() => {
  const now = Date.now();
  const elapsed = Math.floor((now - startTime) / 1000);
  let timeLeft = TOTAL_TIME - elapsed;

  if (timeLeft < 0) timeLeft = 0;

  let minutes = Math.floor(timeLeft / 60);
  let seconds = timeLeft % 60;

  minutes = minutes < 10 ? "0" + minutes : minutes;
  seconds = seconds < 10 ? "0" + seconds : seconds;

  timerEl.innerText = minutes + ":" + seconds;

  // 🔴 đổi màu khi còn < 60s
  if (timeLeft <= 60) {
    timerEl.classList.add("timer-danger");
  }

  // hết giờ
  if (timeLeft === 0) {
    clearInterval(countdown);
    alert("Hết giờ!");
    localStorage.removeItem("startTime"); // reset cho lần sau
    submitTest();
  }

}, 1000);
  // chặn copy
document.addEventListener("copy", e => {
  e.preventDefault();
});

// chặn paste
document.addEventListener("paste", e => {
  e.preventDefault();
});

// chặn cut
document.addEventListener("cut", e => {
  e.preventDefault();
});

// chặn chuột phải
document.addEventListener("contextmenu", e => {
  e.preventDefault();
});

// chặn phím
document.addEventListener("keydown", e => {
  if (
    (e.ctrlKey && ["c","v","u","s"].includes(e.key.toLowerCase())) ||
    e.key === "F12"
  ) {
    e.preventDefault();
  }
});
</script>

</body>
</html>
